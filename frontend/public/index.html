<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GrooveBox</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
  <link rel="icon" type="image/png" href="assets/favicon.jpg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ed601a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GrooveBox">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-content">

      <img src="assets/LogoGrooveBox.jpg" alt="GrooveBox logo" class="logo">

      <div class="title-block">
        <h1>GrooveBox</h1>
        <p class="subtitle">Ton groove, ta collection</p>
      </div>

    </div>

    <button id="logoutBtn" onclick="logout()" class="btn-secondary logout-btn" style="display:none;">
      <i class="fa-solid fa-right-from-bracket"></i><span class="logout-text"> Déconnexion</span>
    </button>
  </header>

  <!-- CONNEXION / INSCRIPTION -->
  <section id="authSection" class="form">
    <h2 id="authTitle">Connexion</h2>

    <input id="authUsername" placeholder="Nom d'utilisateur" style="display:none;">
    <input id="authEmail" placeholder="Email" type="email">
    <input id="authPassword" placeholder="Mot de passe" type="password">

    <button id="authSubmitBtn" onclick="handleAuthSubmit()">
      Se connecter
    </button>

    <button onclick="toggleAuthMode()" class="btn-secondary">
      <span id="authToggleText">Pas encore de compte ? Inscris-toi</span>
    </button>
  </section>

  <!-- CONTENU DE L'APPLI (visible uniquement une fois connecté) -->
  <div id="appContent" style="display:none;">

    <!-- COLLECTION -->
    <section class="collection">

      <div class="collection-header">
        <h2>Ma collection</h2>
        <div class="header-right">
          <span id="count">0 vinyles</span>

          <div class="desktop-menu-wrapper">
            <button id="desktopMenuBtn" class="desktop-menu-btn" onclick="toggleDesktopMenu(event)" aria-label="Menu">
              <i class="fa-solid fa-bars"></i>
            </button>

            <div id="desktopMenu" class="desktop-menu">
              <button onclick="openSheetFromMenu('add')">
                <i class="fa-solid fa-plus"></i> Ajouter un vinyle
              </button>
              <button onclick="openSheetFromMenu('search')">
                <i class="fa-solid fa-magnifying-glass"></i> Recherche
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="sort-bar">
        <button id="sortBtn-title" onclick="sortVinyls('title')">A → Z</button>
        <button id="sortBtn-artist" onclick="sortVinyls('artist')">Artiste</button>
        <button id="sortBtn-year" onclick="sortVinyls('year')">Année</button>
        <button id="sortBtn-genre" onclick="sortVinyls('genre')">Genre</button>
        <!--button onclick="resetOrder()">Reset ordre</!--button-->
      </div>

      <div id="list"></div>

    </section>

    <!-- AJOUT / MODIFICATION VINYLE -->
    <section id="vinylFormSection" class="form">
      <div class="sheet-header">
        <h2 id="formTitle">Ajouter un vinyle</h2>
        <button class="sheet-close" onclick="closeSheets()" aria-label="Fermer">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="form-grid">
        <input id="title" placeholder="Titre" oninput="scheduleCoverSearch()">
        <input id="artist" placeholder="Artiste" oninput="scheduleCoverSearch()">
        <input id="year" placeholder="Année" type="number" inputmode="numeric" min="1948" max="2026">

        <select id="genre" onchange="toggleGenreOther()">
          <option value="">Genre...</option>
          <option value="Rock">Rock</option>
          <option value="Pop">Pop</option>
          <option value="Jazz">Jazz</option>
          <option value="Blues">Blues</option>
          <option value="Funk">Funk</option>
          <option value="Soul">Soul</option>
          <option value="Electro">Electro</option>
          <option value="Hip-Hop">Hip-Hop</option>
          <option value="Rap">Rap</option>
          <option value="Reggae">Reggae</option>
          <option value="Classique">Classique</option>
          <option value="Metal">Metal</option>
          <option value="Folk">Folk</option>
          <option value="Grunge">Grunge</option>
          <option value="Progressive Rock">Progressive Rock</option>
          <option value="Autre">Autre...</option>
        </select>

        <input id="genreOther" placeholder="Préciser le genre" style="display:none;">
      </div>

      <div class="cover-actions-row">
        <button type="button" class="btn-secondary" onclick="document.getElementById('cameraInput').click()">
          <i class="fa-solid fa-camera"></i> Prendre une photo
        </button>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleCameraCapture(event)">

      <div id="coverPicker" class="cover-picker" style="display:none;">
        <p class="cover-picker-label">Choisis une pochette :</p>
        <div id="coverResults" class="cover-results"></div>
      </div>

      <input id="coverUrl" placeholder="Ou colle une URL d'image directement (optionnel)">

      <button id="submitBtn" onclick="addVinyl()">
        <i class="fa-solid fa-plus"></i> Ajouter
      </button>

      <button id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#333;">
        Annuler
      </button>
    </section>

    <!-- RECHERCHE -->
    <section id="searchSection" class="search">
      <div class="sheet-header">
        <h2>Recherche</h2>
        <button class="sheet-close" onclick="closeSheets()" aria-label="Fermer">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <input id="search" placeholder="Rechercher un artiste" oninput="searchVinyls()">

      <div class="search-actions">
        <button onclick="searchVinyls()">
          <i class="fa-solid fa-magnifying-glass"></i> Rechercher
        </button>

        <button onclick="clearSearchField()" class="btn-secondary">
          <i class="fa-solid fa-xmark"></i> Voir toute la collection
        </button>
      </div>
    </section>

  </div>

  <!-- FOND SOMBRE DERRIÈRE LES PANNEAUX MOBILES -->
  <div id="sheetBackdrop" class="sheet-backdrop" onclick="closeSheets()"></div>

  <!-- NAV MOBILE EN BAS -->
  <nav id="bottomNav">
    <button id="navBtn-collection" onclick="closeSheets(); document.getElementById('list').scrollIntoView({behavior:'smooth'});">
      <i class="fa-solid fa-record-vinyl"></i>
      <span>Collection</span>
    </button>
    <button id="navBtn-add" onclick="openSheet('add')">
      <i class="fa-solid fa-plus"></i>
      <span>Ajouter</span>
    </button>
    <button id="navBtn-search" onclick="openSheet('search')">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Recherche</span>
    </button>
  </nav>

  <!-- MODALE DE CONFIRMATION SUPPRESSION -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
      <h2>Supprimer ce vinyle ?</h2>
      <p id="deleteModalText" class="modal-text"></p>

      <div class="modal-actions">
        <button id="deleteCancelBtn" onclick="closeDeleteModal()" class="btn-secondary">
          Annuler
        </button>
        <button id="deleteConfirmBtn" onclick="confirmDelete()" class="btn-danger">
          <i class="fa-solid fa-trash"></i> Supprimer
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
